name: Prepare Reference Layers

on:
  workflow_dispatch:
    inputs:
      states:
        description: "States to build, space-separated"
        required: true
        default: "LA MS AL"
      skip_population:
        description: "Skip population blocks"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: prepare-reference-layers
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev proj-bin libproj-dev libspatialindex-dev

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare reference layers
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.skip_population }}" = "true" ]; then
            FLAGS="$FLAGS --skip-population"
          fi
          python scripts/prepare_reference_layers.py --states ${{ github.event.inputs.states }} $FLAGS

      - name: Commit reference layers
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/reference
          git commit -m "Update reference GIS layers" || echo "No changes to commit"
          git push
